---
- name: Create d4g-visio directory
  file:
    path: /opt/d4g-visio
    state: directory

- name: Create d4g-visio data directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  with_items:
    - /opt/d4g-visio/data/redis
    - /opt/d4g-visio/data/livekit

- name: Create d4g-visio template files
  template:
    src: "{{ item }}.j2"
    dest: /opt/d4g-visio/{{ item }}
  with_items:
    - docker-compose.yml
    - visio.env
    - livekit-server.yaml
    - default.conf.template

- name: Copy custom CSS
  copy:
    src: ../templates/d4g-custom.css
    dest: /opt/d4g-visio/d4g-custom.css

- name: Copy ensure-admin script
  copy:
    src: ensure-admin.py
    dest: /opt/d4g-visio/ensure-admin.py
    mode: "0600"

- name: Pull
  command: docker compose pull
  args:
    chdir: /opt/d4g-visio
  tags:
    - pull
  when: inventory_hostname == deploy_on

- name: Up
  command: docker stack deploy -c docker-compose.yml d4g-visio
  args:
    chdir: /opt/d4g-visio
  tags:
    - up
  when: is_swarm_leader | default(false)

- name: Ensure admin user exists
  shell: |
    sleep 10
    CONTAINER=$(docker ps -q -f name=d4g-visio_backend -f status=running | head -1)
    [ -z "$CONTAINER" ] && echo "No backend container running" && exit 0
    cat /opt/d4g-visio/ensure-admin.py | docker exec -i "$CONTAINER" python
  register: admin_result
  changed_when: "'Created' in admin_result.stdout or 'Promoted' in admin_result.stdout"
  when: inventory_hostname == deploy_on
