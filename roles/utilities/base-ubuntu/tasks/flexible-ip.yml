---
- name: Install flexible IP configuration script
  template:
    src: configure-flexible-ip.sh.j2
    dest: /usr/local/bin/configure-flexible-ip
    owner: root
    group: root
    mode: "0755"
  notify: restart flexible-ip

- name: Create flexible-ip systemd service
  copy:
    dest: /etc/systemd/system/flexible-ip.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Configure flexible IP as outbound source address
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/configure-flexible-ip
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
  notify: restart flexible-ip

- name: Enable flexible-ip service
  systemd:
    name: flexible-ip.service
    enabled: yes
    daemon_reload: yes
