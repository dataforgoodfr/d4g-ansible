---
- name: Create d4g-visio directory
  file:
    path: /opt/d4g-visio
    state: directory

- name: Create d4g-visio data directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  with_items:
    - /opt/d4g-visio/data/redis
    - /opt/d4g-visio/data/livekit

- name: Create d4g-visio template files
  template:
    src: "{{ item }}.j2"
    dest: /opt/d4g-visio/{{ item }}
  with_items:
    - docker-compose.yml
    - visio.env
    - livekit-server.yaml
    - default.conf.template

- name: Pull
  command: docker compose pull
  args:
    chdir: /opt/d4g-visio
  tags:
    - pull
  when: inventory_hostname == deploy_on

- name: Up
  command: docker stack deploy -c docker-compose.yml d4g-visio
  args:
    chdir: /opt/d4g-visio
  tags:
    - up
  when: is_swarm_leader | default(false)
