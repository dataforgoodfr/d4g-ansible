---
- name: Set HTTP-01 challenge flag
  set_fact:
    has_http_challenges: "{{ certificates | selectattr('challenge', 'defined') | selectattr('challenge', 'equalto', 'http') | list | length > 0 }}"

- name: Create challenge responder directory
  file:
    path: /opt/acme-challenge-responder
    state: directory
    mode: "0755"
  when: has_http_challenges

- name: Copy nginx config for challenge responder
  copy:
    src: acme-nginx.conf
    dest: /opt/acme-challenge-responder/acme-nginx.conf
    mode: "0644"
  when: has_http_challenges

- name: Create challenge responder service definition
  template:
    src: acme-challenge-responder.yml.j2
    dest: /opt/acme-challenge-responder/docker-compose.yml
    mode: "0644"
  when: has_http_challenges

- name: Deploy challenge responder stack
  command: docker stack deploy --with-registry-auth -c /opt/acme-challenge-responder/docker-compose.yml acme-challenge-responder
  when: has_http_challenges

- name: Remove challenge responder stack when not needed
  command: docker stack rm acme-challenge-responder
  when: not has_http_challenges
  failed_when: false

# Process each certificate in the certificates list
- name: Process certificates
  include_tasks: certificate.yml
  loop: "{{ certificates }}"
  loop_control:
    loop_var: cert
    label: "{{ cert.name }}"

# Cleanup stale acme.sh domain folders that are no longer in our certificates list
- name: Build list of expected acme.sh domain folders
  set_fact:
    expected_acme_folders: "{{ certificates | map(attribute='domains') | map('first') | map('regex_replace', '$', '_ecc') | list }}"

- name: Find existing acme.sh domain folders
  find:
    paths: /root/.acme.sh
    file_type: directory
    patterns: "*_ecc"
  register: existing_acme_folders

- name: Remove stale acme.sh domain folders
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ existing_acme_folders.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: (item.path | basename) not in expected_acme_folders

# Email notifications (configure once)
- name: Check if notify needs to be enabled
  lineinfile:
    dest: /root/.acme.sh/account.conf
    line: "SAVED_MAIL_FROM='{{ notification_mail_from }}'"
  check_mode: yes
  register: notify_enabled

- name: Enable email notify hook
  command: /root/.acme.sh/acme.sh --set-notify --notify-hook mail --notify-level 2
  environment:
    MAIL_FROM: "{{ notification_mail_from }}"
    MAIL_TO: "{{ notification_mail_to }}"
  when: notify_enabled.changed == True

# Cron job for automatic renewal (runs once, renews all certs)
- name: Creating ansible-managed acme.sh renewal cronjob
  cron:
    name: "acme.sh ansible-managed crontab"
    minute: "{{ 59 | random(seed=inventory_hostname) }}"
    hour: "0"
    job: '"/root/.acme.sh"/acme.sh --cron --home "/root/.acme.sh" 2>&1 | logger -t acme-sh'
