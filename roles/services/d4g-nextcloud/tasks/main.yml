---
- name: Create d4g-nextcloud directory
  file:
    path: /opt/d4g-nextcloud
    state: directory

- name: Create d4g-nextcloud files
  template:
    src: "{{ item }}.j2"
    dest: /opt/d4g-nextcloud/{{ item }}
  with_items:
    - docker-compose.yml
    - nextcloud-shared.env
    - nextcloud-instance.env

- name: Create d4g-nextcloud volume directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  with_items:
    - /opt/d4g-nextcloud/nextcloud-data/html
    - /opt/d4g-nextcloud/nextcloud-data/ncdata
    - /opt/d4g-nextcloud/nextcloud-data/mnt
    - /opt/d4g-nextcloud/apache-data
    - /opt/d4g-nextcloud/redis-data
    - /opt/d4g-nextcloud/clamav-data

- name: Set correct ownership for nextcloud-data directory
  file:
    path: /opt/d4g-nextcloud/nextcloud-data/
    owner: "33"
    group: "33"
    state: directory
    recurse: yes

- name: Set correct ownership for apache-data directory
  file:
    path: /opt/d4g-nextcloud/apache-data/
    owner: "33"
    group: "33"
    state: directory
    recurse: yes

- name: Set correct ownership for redis-data directory
  file:
    path: /opt/d4g-nextcloud/redis-data
    owner: "999"
    group: "999"
    state: directory
    recurse: yes

- name: Set correct ownership for clamav-data directory
  file:
    path: /opt/d4g-nextcloud/clamav-data
    owner: "100"
    group: "100"
    state: directory
    recurse: yes

- name: Pull
  command: docker compose pull
  args:
    chdir: /opt/d4g-nextcloud
  tags:
    - pull
  when: inventory_hostname == deploy_on

- name: Up
  command: docker stack deploy -c docker-compose.yml d4g-nextcloud
  args:
    chdir: /opt/d4g-nextcloud
  tags:
    - up
  when: is_swarm_leader | default(false)

- import_role:
    name: roles/utilities/s3-backup
  vars:
    service_name: "nextcloud-data"
    data_dir: "/opt/d4g-nextcloud/nextcloud-data"
  tags:
    - backup
    - service
  when: inventory_hostname == deploy_on

- import_role:
    name: roles/utilities/sql-backup
  vars:
    service: d4g-nextcloud
    service_dir: /opt/d4g-nextcloud
    pgsql_host: "{{ lookup('env', 'POLETECH_DB_HOST') }}"
    pgsql_port: "{{ lookup('env', 'POLETECH_DB_PORT') }}"
    pgsql_user: oc_nextcloud
    pgsql_password: "{{ lookup('env', 'NEXTCLOUD_DB_PASSWORD') }}"
    pgsql_database: nextcloud
  tags:
    - backup
    - service
  when: inventory_hostname == deploy_on
