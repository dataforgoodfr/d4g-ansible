---
- name: Create d4g-home directory
  file:
    path: /opt/d4g-home
    state: directory

- name: Create d4g-home template files
  template:
    src: "{{ item }}.j2"
    dest: /opt/d4g-home/{{ item }}
  with_items:
    - docker-compose.yml
    - home.env

- name: Pull
  command: docker compose pull
  args:
    chdir: /opt/d4g-home
  tags:
    - pull
  when: inventory_hostname == deploy_on

- name: Up
  command: docker stack deploy -c docker-compose.yml d4g-home
  args:
    chdir: /opt/d4g-home
  tags:
    - up
  when: is_swarm_leader | default(false)
